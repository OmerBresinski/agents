# Docker Compose for local testing of the OpenCode Agent Pool
# Usage: docker compose up --build

services:
  # ── Bastion (Jump Host) ──────────────────────────────────────
  bastion:
    build:
      context: ./bastion
      dockerfile: Dockerfile
    ports:
      - "2222:22"
    environment:
      SSH_AUTHORIZED_KEYS: "${SSH_AUTHORIZED_KEYS}"
      AGENT_1_HOST: agent-1
      AGENT_2_HOST: agent-2
      AGENT_3_HOST: agent-3
      AGENT_4_HOST: agent-4
      AGENT_5_HOST: agent-5
    depends_on:
      - agent-1
      - agent-2
      - agent-3
      - agent-4
      - agent-5
    networks:
      - agent-network

  # ── Dashboard ────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      AGENT_1_HOST: agent-1
      AGENT_2_HOST: agent-2
      AGENT_3_HOST: agent-3
      AGENT_4_HOST: agent-4
      AGENT_5_HOST: agent-5
      AGENT_STATUS_PORT: "8080"
      DASHBOARD_USER: admin
      DASHBOARD_PASSWORD: "${DASHBOARD_PASSWORD:-}"
    depends_on:
      - agent-1
      - agent-2
      - agent-3
      - agent-4
      - agent-5
    networks:
      - agent-network

  # ── Agent 1 ──────────────────────────────────────────────────
  agent-1:
    build:
      context: ./agent
      dockerfile: Dockerfile
    environment:
      AGENT_ID: agent-1
      SSH_AUTHORIZED_KEYS: "${SSH_AUTHORIZED_KEYS}"
      AWS_BEARER_TOKEN_BEDROCK: "${AWS_BEARER_TOKEN_BEDROCK}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
    volumes:
      - agent-1-workspace:/workspace
    networks:
      - agent-network

  # ── Agent 2 ──────────────────────────────────────────────────
  agent-2:
    build:
      context: ./agent
      dockerfile: Dockerfile
    environment:
      AGENT_ID: agent-2
      SSH_AUTHORIZED_KEYS: "${SSH_AUTHORIZED_KEYS}"
      AWS_BEARER_TOKEN_BEDROCK: "${AWS_BEARER_TOKEN_BEDROCK}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
    volumes:
      - agent-2-workspace:/workspace
    networks:
      - agent-network

  # ── Agent 3 ──────────────────────────────────────────────────
  agent-3:
    build:
      context: ./agent
      dockerfile: Dockerfile
    environment:
      AGENT_ID: agent-3
      SSH_AUTHORIZED_KEYS: "${SSH_AUTHORIZED_KEYS}"
      AWS_BEARER_TOKEN_BEDROCK: "${AWS_BEARER_TOKEN_BEDROCK}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
    volumes:
      - agent-3-workspace:/workspace
    networks:
      - agent-network

  # ── Agent 4 ──────────────────────────────────────────────────
  agent-4:
    build:
      context: ./agent
      dockerfile: Dockerfile
    environment:
      AGENT_ID: agent-4
      SSH_AUTHORIZED_KEYS: "${SSH_AUTHORIZED_KEYS}"
      AWS_BEARER_TOKEN_BEDROCK: "${AWS_BEARER_TOKEN_BEDROCK}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
    volumes:
      - agent-4-workspace:/workspace
    networks:
      - agent-network

  # ── Agent 5 ──────────────────────────────────────────────────
  agent-5:
    build:
      context: ./agent
      dockerfile: Dockerfile
    environment:
      AGENT_ID: agent-5
      SSH_AUTHORIZED_KEYS: "${SSH_AUTHORIZED_KEYS}"
      AWS_BEARER_TOKEN_BEDROCK: "${AWS_BEARER_TOKEN_BEDROCK}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
    volumes:
      - agent-5-workspace:/workspace
    networks:
      - agent-network

# ── Volumes ──────────────────────────────────────────────────────
volumes:
  agent-1-workspace:
  agent-2-workspace:
  agent-3-workspace:
  agent-4-workspace:
  agent-5-workspace:

# ── Networks ─────────────────────────────────────────────────────
networks:
  agent-network:
    driver: bridge
