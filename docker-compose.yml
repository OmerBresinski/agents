# Docker Compose for local testing of the OpenCode Agent Pool
# Usage: docker compose up --build

services:
  # ── MinIO (S3-compatible bucket for local testing) ─────────
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - agent-network

  # ── MinIO Init (create bucket on startup) ──────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/opencode-storage --ignore-existing;
      echo 'Bucket opencode-storage created';
      "
    networks:
      - agent-network

  # ── Bastion (Jump Host) ──────────────────────────────────────
  bastion:
    build:
      context: ./bastion
      dockerfile: Dockerfile
    ports:
      - "2222:22"
    environment:
      SSH_AUTHORIZED_KEYS: "${SSH_AUTHORIZED_KEYS}"
      SSH_PASSWORD: "${SSH_PASSWORD:-}"
      AGENT_1_HOST: agent-1
      AGENT_2_HOST: agent-2
      AGENT_3_HOST: agent-3
      AGENT_4_HOST: agent-4
      AGENT_5_HOST: agent-5
    depends_on:
      - agent-1
      - agent-2
      - agent-3
      - agent-4
      - agent-5
    networks:
      - agent-network

  # ── Dashboard ────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      AGENT_1_HOST: agent-1
      AGENT_2_HOST: agent-2
      AGENT_3_HOST: agent-3
      AGENT_4_HOST: agent-4
      AGENT_5_HOST: agent-5
      AGENT_STATUS_PORT: "8080"
      DASHBOARD_USER: admin
      DASHBOARD_PASSWORD: "${DASHBOARD_PASSWORD:-}"
      BUCKET_ENDPOINT: "http://minio:9000"
      BUCKET_ACCESS_KEY_ID: "minioadmin"
      BUCKET_SECRET_ACCESS_KEY: "minioadmin"
      BUCKET_NAME: "opencode-storage"
      BUCKET_REGION: "us-east-1"
    depends_on:
      - minio-init
      - agent-1
      - agent-2
      - agent-3
      - agent-4
      - agent-5
    networks:
      - agent-network

  # ── Agent 1 ──────────────────────────────────────────────────
  agent-1:
    build:
      context: ./agent
      dockerfile: Dockerfile
    environment:
      AGENT_ID: agent-1
      SSH_AUTHORIZED_KEYS: "${SSH_AUTHORIZED_KEYS}"
      SSH_PASSWORD: "${SSH_PASSWORD:-}"
      AWS_BEARER_TOKEN_BEDROCK: "${AWS_BEARER_TOKEN_BEDROCK}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      BUCKET_ENDPOINT: "http://minio:9000"
      BUCKET_ACCESS_KEY_ID: "minioadmin"
      BUCKET_SECRET_ACCESS_KEY: "minioadmin"
      BUCKET_NAME: "opencode-storage"
      BUCKET_REGION: "us-east-1"
    depends_on:
      - minio-init
    volumes:
      - agent-1-workspace:/workspace
    networks:
      - agent-network

  # ── Agent 2 ──────────────────────────────────────────────────
  agent-2:
    build:
      context: ./agent
      dockerfile: Dockerfile
    environment:
      AGENT_ID: agent-2
      SSH_AUTHORIZED_KEYS: "${SSH_AUTHORIZED_KEYS}"
      SSH_PASSWORD: "${SSH_PASSWORD:-}"
      AWS_BEARER_TOKEN_BEDROCK: "${AWS_BEARER_TOKEN_BEDROCK}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      BUCKET_ENDPOINT: "http://minio:9000"
      BUCKET_ACCESS_KEY_ID: "minioadmin"
      BUCKET_SECRET_ACCESS_KEY: "minioadmin"
      BUCKET_NAME: "opencode-storage"
      BUCKET_REGION: "us-east-1"
    depends_on:
      - minio-init
    volumes:
      - agent-2-workspace:/workspace
    networks:
      - agent-network

  # ── Agent 3 ──────────────────────────────────────────────────
  agent-3:
    build:
      context: ./agent
      dockerfile: Dockerfile
    environment:
      AGENT_ID: agent-3
      SSH_AUTHORIZED_KEYS: "${SSH_AUTHORIZED_KEYS}"
      SSH_PASSWORD: "${SSH_PASSWORD:-}"
      AWS_BEARER_TOKEN_BEDROCK: "${AWS_BEARER_TOKEN_BEDROCK}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      BUCKET_ENDPOINT: "http://minio:9000"
      BUCKET_ACCESS_KEY_ID: "minioadmin"
      BUCKET_SECRET_ACCESS_KEY: "minioadmin"
      BUCKET_NAME: "opencode-storage"
      BUCKET_REGION: "us-east-1"
    depends_on:
      - minio-init
    volumes:
      - agent-3-workspace:/workspace
    networks:
      - agent-network

  # ── Agent 4 ──────────────────────────────────────────────────
  agent-4:
    build:
      context: ./agent
      dockerfile: Dockerfile
    environment:
      AGENT_ID: agent-4
      SSH_AUTHORIZED_KEYS: "${SSH_AUTHORIZED_KEYS}"
      SSH_PASSWORD: "${SSH_PASSWORD:-}"
      AWS_BEARER_TOKEN_BEDROCK: "${AWS_BEARER_TOKEN_BEDROCK}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      BUCKET_ENDPOINT: "http://minio:9000"
      BUCKET_ACCESS_KEY_ID: "minioadmin"
      BUCKET_SECRET_ACCESS_KEY: "minioadmin"
      BUCKET_NAME: "opencode-storage"
      BUCKET_REGION: "us-east-1"
    depends_on:
      - minio-init
    volumes:
      - agent-4-workspace:/workspace
    networks:
      - agent-network

  # ── Agent 5 ──────────────────────────────────────────────────
  agent-5:
    build:
      context: ./agent
      dockerfile: Dockerfile
    environment:
      AGENT_ID: agent-5
      SSH_AUTHORIZED_KEYS: "${SSH_AUTHORIZED_KEYS}"
      SSH_PASSWORD: "${SSH_PASSWORD:-}"
      AWS_BEARER_TOKEN_BEDROCK: "${AWS_BEARER_TOKEN_BEDROCK}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      BUCKET_ENDPOINT: "http://minio:9000"
      BUCKET_ACCESS_KEY_ID: "minioadmin"
      BUCKET_SECRET_ACCESS_KEY: "minioadmin"
      BUCKET_NAME: "opencode-storage"
      BUCKET_REGION: "us-east-1"
    depends_on:
      - minio-init
    volumes:
      - agent-5-workspace:/workspace
    networks:
      - agent-network

# ── Volumes ──────────────────────────────────────────────────────
volumes:
  minio-data:
  agent-1-workspace:
  agent-2-workspace:
  agent-3-workspace:
  agent-4-workspace:
  agent-5-workspace:

# ── Networks ─────────────────────────────────────────────────────
networks:
  agent-network:
    driver: bridge
